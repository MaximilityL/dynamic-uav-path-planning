name: "dynamic_uav_path_planning_hard_obstacles"
version: "1.1.2"
description: "Harder PPO+GNN preset with dedicated outputs, denser obstacles, and faster moving traffic"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "hard"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 8
  obstacle_radius: 0.2
  goal_tolerance: 0.3
  collision_distance: 0.15
  max_episode_steps: 900
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.18, 0.45]
  reward_weights:
    goal: 40.0
    progress: 8.0
    collision: -40.0
    clearance: 0.5
    effort: -0.005
    time: -0.01

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 128
  message_passing_steps: 3
  lr_actor: 0.0003
  lr_critic: 0.0006
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  ppo_epochs: 4
  mini_batch_size: 128
  rollout_episodes: 8
  max_grad_norm: 0.5
  action_std_init: 0.45
  device: "auto"

training:
  num_episodes: 1200
  save_interval: 25
  eval_interval: 25
  checkpoint_dir: "checkpoints/hard_obstacles"
  log_dir: "logs/hard_obstacles"
  results_dir: "results/hard_obstacles"
  moving_average_window: 20
  eval_episodes: 12

evaluation:
  num_episodes: 20
  render: false
  deterministic: true
  save_trajectories: true
  output_dir: "results/hard_obstacles/eval"

visualization:
  plot_dir: "results/hard_obstacles/plots"
  trajectory_dir: "results/hard_obstacles/trajectories"
