name: "dynamic_uav_path_planning_post_commit_target_v13"
version: "1.0.0"
description: "Target-stage continuation with teacher-demo intro pretraining, lighter persistent BC, shorter intro horizon, and stage-local regression rollback"
tags:
  [
    "uav",
    "path-planning",
    "dynamic-airspace",
    "pybullet",
    "gnn",
    "ppo",
    "curriculum",
    "teacher",
    "target",
    "post-commit",
    "behavior-cloning",
    "warm-start",
    "demo-pretrain",
    "rollback",
    "target-intro",
  ]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  auto_time_budget_max_steps: 0
  reward_weights:
    goal: 40.0
    progress: 8.0
    progress_negative_scale: 1.0
    frontier_progress: 0.0
    commit_bonus_min_clearance: 0.0
    goal_proximity_bonus: 0.0
    goal_proximity_radius: 0.0
    goal_proximity_power: 1.0
    progress_milestone_bonus: 0.0
    progress_milestone_thresholds: []
    progress_milestone_bonus_weights: []
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    danger_clearance_threshold: 0.0
    danger_clearance_penalty: 0.0
    danger_clearance_power: 1.0
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0
    remaining_distance: 0.0
    stall: 0.0
    stall_window_steps: 0
    stall_progress_threshold: 0.0
    stall_grace_steps: 0
    stall_remaining_ratio_threshold: 0.15

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.00006
  lr_critic: 0.00012
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.003
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 420
  save_interval: 15
  eval_interval: 15
  checkpoint_dir: "checkpoints/post_commit_target_v13"
  log_dir: "logs/post_commit_target_v13"
  results_dir: "results/post_commit_target_v13"
  moving_average_window: 20
  eval_episodes: 10
  print_interval: 10
  resume:
    checkpoint_path: "checkpoints/post_commit_target_v9/stages/target_default_intro/best_model.pth"
    load_optimizer_state: false
    load_scheduler_state: false
    restore_curriculum_progress: false
  bc_demo_pretrain:
    enabled: true
    stages: ["target_default_intro", "target_default"]
    episodes: 80
    epochs: 16
    batch_size: 128
    teacher_gated_only: false
    gate_signal: "teacher_active"
    normalize_target_action: false
    seed_offset: 200000
    stage_overrides:
      target_default:
        episodes: 36
        epochs: 10
        batch_size: 128
        teacher_gated_only: true
        gate_signal: "teacher_active"
  bc_warm_start:
    enabled: true
    stages: ["target_default_intro", "target_default"]
    initial_coef: 0.08
    final_coef: 0.02
    anneal_episodes: 180
    teacher_gated_only: true
    gate_signal: "bypass_active"
    normalize_target_action: false
    stage_overrides:
      target_default_intro:
        initial_coef: 0.22
        final_coef: 0.06
        anneal_episodes: 260
        gate_signal: "teacher_active"
      target_default:
        initial_coef: 0.08
        final_coef: 0.02
        anneal_episodes: 180
        gate_signal: "bypass_active"
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.5
    absolute_drop_threshold: 0.20
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.7
    stage_overrides:
      target_default_intro:
        activate_after_success_rate: 0.15
        absolute_drop_threshold: 0.15
        relative_drop_fraction: 0.6
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.8
  curriculum:
    - name: "target_default_intro"
      min_stage_episodes: 60
      required_consecutive_evals: 1
      advance_success_rate: 0.6
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.60
        obstacle_speed_range: [0.08, 0.24]
        max_episode_steps: 680
        auto_time_budget_steps_per_meter: 108.0
        auto_time_budget_padding: 16
        auto_time_budget_max_steps: 680
        scenario_config:
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.35, 0.82]
          route_obstacle_lateral_offset_range: [-0.55, 0.55]
          route_obstacle_vertical_offset_range: [-0.18, 0.18]
          route_obstacle_longitudinal_jitter: 0.06
          obstacle_start_goal_exclusion_radius: 0.75
        reward_weights:
          goal: 82.0
          progress: 10.8
          progress_negative_scale: 1.8
          frontier_progress: 10.0
          commit_bonus_min_clearance: 0.12
          goal_proximity_bonus: 18.0
          goal_proximity_radius: 1.0
          goal_proximity_power: 2.0
          progress_milestone_bonus: 0.0
          progress_milestone_thresholds: [0.20, 0.40, 0.60, 0.80, 0.90]
          progress_milestone_bonus_weights: [1.5, 2.5, 4.0, 6.0, 8.0]
          collision: -40.0
          clearance: 0.5
          clearance_positive_scale: 0.0
          danger_clearance_threshold: 0.24
          danger_clearance_penalty: 1.4
          danger_clearance_power: 1.5
          effort: -0.005
          time: -0.014
          timeout: -14.0
          timeout_distance: -34.0
          remaining_distance: -0.003
          stall: -0.02
          stall_window_steps: 42
          stall_progress_threshold: 0.12
          stall_grace_steps: 90
          stall_remaining_ratio_threshold: 0.24
        teacher_config:
          enabled: true
          reward_scale: 0.34
          episode_bonus_budget: 18.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.35
          lateral_avoidance_gain: 1.1
          lateral_avoidance_radius: 0.75
          forward_lookahead: 2.2
          far_speed: 0.86
          near_speed: 0.50
          near_goal_distance: 1.0
          direction_weight: 0.95
          speed_weight: 0.05

    - name: "target_default"
      min_stage_episodes: 140
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.35
        obstacle_speed_range: [0.12, 0.35]
        max_episode_steps: 880
        auto_time_budget_steps_per_meter: 112.0
        auto_time_budget_padding: 18
        auto_time_budget_max_steps: 880
        reward_weights:
          goal: 76.0
          progress: 9.8
          progress_negative_scale: 2.0
          frontier_progress: 8.0
          commit_bonus_min_clearance: 0.15
          goal_proximity_bonus: 16.0
          goal_proximity_radius: 0.85
          goal_proximity_power: 2.0
          progress_milestone_bonus: 0.0
          progress_milestone_thresholds: [0.20, 0.40, 0.60, 0.80, 0.92]
          progress_milestone_bonus_weights: [1.5, 2.5, 4.0, 6.0, 9.0]
          collision: -40.0
          clearance: 0.5
          clearance_positive_scale: 0.0
          danger_clearance_threshold: 0.28
          danger_clearance_penalty: 2.0
          danger_clearance_power: 1.5
          effort: -0.005
          time: -0.015
          timeout: -15.0
          timeout_distance: -36.0
          remaining_distance: -0.004
          stall: -0.03
          stall_window_steps: 42
          stall_progress_threshold: 0.12
          stall_grace_steps: 90
          stall_remaining_ratio_threshold: 0.25
        teacher_config:
          enabled: true
          reward_scale: 0.28
          episode_bonus_budget: 12.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.35
          lateral_avoidance_gain: 0.85
          lateral_avoidance_radius: 0.80
          forward_lookahead: 2.0
          far_speed: 0.84
          near_speed: 0.48
          near_goal_distance: 1.0
          direction_weight: 0.95
          speed_weight: 0.05

evaluation:
  num_episodes: 20
  render: true
  deterministic: true
  save_trajectories: true
  output_dir: "results/post_commit_target_v13/eval"

visualization:
  plot_dir: "results/post_commit_target_v13/plots"
  trajectory_dir: "results/post_commit_target_v13/trajectories"
