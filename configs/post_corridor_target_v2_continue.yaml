name: "dynamic_uav_path_planning_post_corridor_target_v2_continue"
version: "1.0.0"
description: "Continuation from the best reached bridge_crossing_easy_route_lock checkpoint"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "curriculum", "teacher", "target", "continue"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  reward_weights:
    goal: 40.0
    progress: 8.0
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.00010
  lr_critic: 0.00020
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 700
  save_interval: 15
  eval_interval: 15
  checkpoint_dir: "checkpoints/post_corridor_target_v2_continue"
  log_dir: "logs/post_corridor_target_v2_continue"
  results_dir: "results/post_corridor_target_v2_continue"
  moving_average_window: 20
  eval_episodes: 10
  print_interval: 10
  resume:
    checkpoint_path: "checkpoints/post_corridor_target_v2/stages/bridge_crossing_easy_route_lock/best_model.pth"
    load_optimizer_state: false
    load_scheduler_state: false
    restore_curriculum_progress: true
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.7
    absolute_drop_threshold: 0.25
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.7
  curriculum:
    - name: "bridge_entry_route_lock"
      min_stage_episodes: 40
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 1.05
        obstacle_speed_range: [0.02, 0.06]
        max_episode_steps: 235
        auto_time_budget_steps_per_meter: 108.0
        auto_time_budget_padding: 12
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.46, 0.54]
          goal_relative_y_range: [-0.20, 0.20]
          goal_relative_z_range: [-0.08, 0.08]
          min_start_goal_distance: 1.55
          obstacle_start_goal_clearance_margin: 0.20
          obstacle_start_goal_exclusion_radius: 0.90
          route_obstacle_count: 1
          route_obstacle_progress_range: [0.46, 0.68]
          route_obstacle_lateral_offset_range: [-0.42, 0.42]
          route_obstacle_vertical_offset_range: [-0.16, 0.16]
          route_obstacle_longitudinal_jitter: 0.06
        reward_weights:
          goal: 76.0
          progress: 12.0
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.009
          timeout: -9.0
          timeout_distance: -22.0
        teacher_config:
          enabled: true
          reward_scale: 0.38
          episode_bonus_budget: 18.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.92
          near_speed: 0.62
          near_goal_distance: 1.0

    - name: "bridge_crossing_easy_route_lock"
      min_stage_episodes: 45
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.98
        obstacle_speed_range: [0.02, 0.09]
        max_episode_steps: 245
        auto_time_budget_steps_per_meter: 110.0
        auto_time_budget_padding: 12
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.50, 0.60]
          goal_relative_y_range: [-0.26, 0.26]
          goal_relative_z_range: [-0.10, 0.10]
          min_start_goal_distance: 1.75
          obstacle_start_goal_clearance_margin: 0.18
          obstacle_start_goal_exclusion_radius: 0.92
          route_obstacle_count: 2
          route_obstacle_progress_range: [0.40, 0.80]
          route_obstacle_lateral_offset_range: [-0.42, 0.42]
          route_obstacle_vertical_offset_range: [-0.16, 0.16]
          route_obstacle_longitudinal_jitter: 0.08
        reward_weights:
          goal: 74.0
          progress: 11.5
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.010
          timeout: -10.0
          timeout_distance: -26.0
        teacher_config:
          enabled: true
          reward_scale: 0.32
          episode_bonus_budget: 14.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.60
          near_goal_distance: 1.0

    - name: "bridge_crossing_commit"
      min_stage_episodes: 35
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.85
        obstacle_speed_range: [0.04, 0.12]
        max_episode_steps: 275
        auto_time_budget_steps_per_meter: 114.0
        auto_time_budget_padding: 14
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.60, 0.72]
          goal_relative_y_range: [-0.42, 0.42]
          goal_relative_z_range: [-0.16, 0.16]
          min_start_goal_distance: 2.2
          obstacle_start_goal_clearance_margin: 0.18
          obstacle_start_goal_exclusion_radius: 0.95
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.34, 0.86]
          route_obstacle_lateral_offset_range: [-0.40, 0.40]
          route_obstacle_vertical_offset_range: [-0.18, 0.18]
          route_obstacle_longitudinal_jitter: 0.10
        reward_weights:
          goal: 70.0
          progress: 10.8
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.012
          timeout: -12.0
          timeout_distance: -28.0
        teacher_config:
          enabled: true
          reward_scale: 0.24
          episode_bonus_budget: 10.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.58
          near_goal_distance: 1.0

    - name: "medium_crossing"
      min_stage_episodes: 50
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.75
        obstacle_speed_range: [0.06, 0.16]
        max_episode_steps: 330
        auto_time_budget_steps_per_meter: 120.0
        auto_time_budget_padding: 16
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.70, 0.82]
          goal_relative_y_range: [-0.55, 0.55]
          goal_relative_z_range: [-0.20, 0.20]
          min_start_goal_distance: 2.6
          obstacle_start_goal_clearance_margin: 0.15
          obstacle_start_goal_exclusion_radius: 0.98
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.28, 0.88]
          route_obstacle_lateral_offset_range: [-0.50, 0.50]
          route_obstacle_vertical_offset_range: [-0.20, 0.20]
          route_obstacle_longitudinal_jitter: 0.14
        reward_weights:
          goal: 64.0
          progress: 9.2
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.013
          timeout: -12.0
          timeout_distance: -30.0
        teacher_config:
          enabled: true
          reward_scale: 0.14
          episode_bonus_budget: 5.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.55
          near_goal_distance: 1.0

    - name: "target_default"
      min_stage_episodes: 90
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.35
        obstacle_speed_range: [0.12, 0.35]
        max_episode_steps: 650
        auto_time_budget_steps_per_meter: 132.0
        auto_time_budget_padding: 18
        scenario_config:
          start_x_progress_range: [0.0833333333, 0.2]
          goal_x_progress_range: [0.8, 0.9166666667]
          min_start_goal_distance: 2.7
          obstacle_start_goal_clearance_margin: 0.12
          obstacle_start_goal_exclusion_radius: 1.00
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.24, 0.92]
          route_obstacle_lateral_offset_range: [-0.75, 0.75]
          route_obstacle_vertical_offset_range: [-0.25, 0.25]
          route_obstacle_longitudinal_jitter: 0.18
        reward_weights:
          goal: 60.0
          progress: 8.0
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.015
          timeout: -12.0
          timeout_distance: -28.0

evaluation:
  num_episodes: 20
  render: true
  deterministic: true
  save_trajectories: true
  output_dir: "results/post_corridor_target_v2_continue/eval"

visualization:
  plot_dir: "results/post_corridor_target_v2_continue/plots"
  trajectory_dir: "results/post_corridor_target_v2_continue/trajectories"
