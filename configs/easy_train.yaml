name: "dynamic_uav_path_planning_easy_train"
version: "1.1.0"
description: "Easier PPO+GNN preset with dedicated outputs for quick learning-signal validation"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "easy"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 1
  obstacle_radius: 0.2
  goal_tolerance: 0.9
  collision_distance: 0.15
  max_episode_steps: 700
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.05, 0.1]
  reward_weights:
    goal: 100.0
    progress: 50.0
    progress_negative_scale: 2.0
    frontier_progress: 50.0
    progress_milestone_bonus: 2.0
    progress_milestone_thresholds: [0.20, 0.40, 0.60, 0.80]
    progress_milestone_bonus_weights: [2.0, 3.0, 5.0, 8.0]
    collision: -10.0
    clearance: 0.5
    clearance_positive_scale: 0.0
    effort: 0.0
    time: -1
    timeout: -50.0
    timeout_distance: -100.0
    remaining_distance: -1
    stall: -10.0
    stall_window_steps: 0
    stall_progress_threshold: 0.0
    stall_grace_steps: 0
    stall_remaining_ratio_threshold: 0.22

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 98
  message_passing_steps: 3
  lr_actor: 0.0003
  lr_critic: 0.0006
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  ppo_epochs: 4
  mini_batch_size: 128
  rollout_episodes: 6
  max_grad_norm: 0.5
  action_std_init: 0.45
  device: "auto"

training:
  num_episodes: 160
  save_interval: 20
  eval_interval: 20
  checkpoint_dir: "checkpoints/easy_train"
  log_dir: "logs/easy_train"
  results_dir: "results/easy_train"
  moving_average_window: 20
  eval_episodes: 8

evaluation:
  num_episodes: 16
  render: false
  deterministic: true
  save_trajectories: true
  output_dir: "results/easy_train/eval"

visualization:
  plot_dir: "results/easy_train/plots"
  trajectory_dir: "results/easy_train/trajectories"
