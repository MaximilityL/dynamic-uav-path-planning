name: "dynamic_uav_path_planning_post_corridor_target"
version: "1.0.0"
description: "Post-corridor curriculum that concentrates training budget on obstacle-interacting bridge and target stages"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "curriculum", "teacher", "target"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  reward_weights:
    goal: 40.0
    progress: 8.0
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.00015
  lr_critic: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 900
  save_interval: 15
  eval_interval: 15
  checkpoint_dir: "checkpoints/post_corridor_target"
  log_dir: "logs/post_corridor_target"
  results_dir: "results/post_corridor_target"
  moving_average_window: 20
  eval_episodes: 10
  print_interval: 10
  resume:
    # checkpoint_path: "checkpoints/corridor_dash/best_model.pth"
    checkpoint_path: "checkpoints/curriculum_goal_first_v3/best_model.pth"
    load_optimizer_state: false
    load_scheduler_state: false
    restore_curriculum_progress: false
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.7
    absolute_drop_threshold: 0.25
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.7
  curriculum:
    - name: "bridge_entry_route_lock"
      min_stage_episodes: 30
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.95
        obstacle_speed_range: [0.02, 0.08]
        max_episode_steps: 220
        auto_time_budget_steps_per_meter: 105.0
        auto_time_budget_padding: 8
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.46, 0.56]
          goal_relative_y_range: [-0.22, 0.22]
          goal_relative_z_range: [-0.10, 0.10]
          min_start_goal_distance: 1.6
          obstacle_start_goal_clearance_margin: 0.15
          obstacle_start_goal_exclusion_radius: 0.72
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.32, 0.74]
          route_obstacle_lateral_offset_range: [-0.30, 0.30]
          route_obstacle_vertical_offset_range: [-0.12, 0.12]
          route_obstacle_longitudinal_jitter: 0.08
        reward_weights:
          goal: 78.0
          progress: 12.5
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.010
          timeout: -10.0
          timeout_distance: -24.0
        teacher_config:
          enabled: true
          reward_scale: 0.34
          episode_bonus_budget: 16.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.92
          near_speed: 0.62
          near_goal_distance: 1.0

    - name: "bridge_crossing_easy_route_lock"
      min_stage_episodes: 40
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.9
        obstacle_speed_range: [0.03, 0.10]
        max_episode_steps: 235
        auto_time_budget_steps_per_meter: 108.0
        auto_time_budget_padding: 10
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.54, 0.64]
          goal_relative_y_range: [-0.30, 0.30]
          goal_relative_z_range: [-0.12, 0.12]
          min_start_goal_distance: 1.9
          obstacle_start_goal_clearance_margin: 0.15
          obstacle_start_goal_exclusion_radius: 0.78
          route_obstacle_count: 3
          route_obstacle_progress_range: [0.30, 0.82]
          route_obstacle_lateral_offset_range: [-0.32, 0.32]
          route_obstacle_vertical_offset_range: [-0.14, 0.14]
          route_obstacle_longitudinal_jitter: 0.10
        reward_weights:
          goal: 74.0
          progress: 11.8
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.011
          timeout: -11.0
          timeout_distance: -28.0
        teacher_config:
          enabled: true
          reward_scale: 0.28
          episode_bonus_budget: 12.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.60
          near_goal_distance: 1.0

    - name: "bridge_crossing_commit"
      min_stage_episodes: 30
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.82
        obstacle_speed_range: [0.04, 0.12]
        max_episode_steps: 265
        auto_time_budget_steps_per_meter: 112.0
        auto_time_budget_padding: 12
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.60, 0.72]
          goal_relative_y_range: [-0.42, 0.42]
          goal_relative_z_range: [-0.16, 0.16]
          min_start_goal_distance: 2.2
          obstacle_start_goal_clearance_margin: 0.18
          obstacle_start_goal_exclusion_radius: 0.85
          route_obstacle_count: 4
          route_obstacle_progress_range: [0.30, 0.86]
          route_obstacle_lateral_offset_range: [-0.32, 0.32]
          route_obstacle_vertical_offset_range: [-0.14, 0.14]
          route_obstacle_longitudinal_jitter: 0.12
        reward_weights:
          goal: 70.0
          progress: 10.8
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.012
          timeout: -12.0
          timeout_distance: -28.0
        teacher_config:
          enabled: true
          reward_scale: 0.22
          episode_bonus_budget: 10.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.58
          near_goal_distance: 1.0

    - name: "medium_crossing"
      min_stage_episodes: 45
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.72
        obstacle_speed_range: [0.06, 0.16]
        max_episode_steps: 320
        auto_time_budget_steps_per_meter: 118.0
        auto_time_budget_padding: 15
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.70, 0.82]
          goal_relative_y_range: [-0.55, 0.55]
          goal_relative_z_range: [-0.20, 0.20]
          min_start_goal_distance: 2.6
          obstacle_start_goal_clearance_margin: 0.15
          obstacle_start_goal_exclusion_radius: 0.90
          route_obstacle_count: 4
          route_obstacle_progress_range: [0.25, 0.88]
          route_obstacle_lateral_offset_range: [-0.45, 0.45]
          route_obstacle_vertical_offset_range: [-0.18, 0.18]
          route_obstacle_longitudinal_jitter: 0.15
        reward_weights:
          goal: 64.0
          progress: 9.2
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.013
          timeout: -12.0
          timeout_distance: -30.0
        teacher_config:
          enabled: true
          reward_scale: 0.12
          episode_bonus_budget: 4.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.55
          near_goal_distance: 1.0

    - name: "target_default"
      min_stage_episodes: 80
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.35
        obstacle_speed_range: [0.12, 0.35]
        max_episode_steps: 650
        auto_time_budget_steps_per_meter: 132.0
        auto_time_budget_padding: 18
        scenario_config:
          start_x_progress_range: [0.0833333333, 0.2]
          goal_x_progress_range: [0.8, 0.9166666667]
          min_start_goal_distance: 2.7
          obstacle_start_goal_clearance_margin: 0.12
          obstacle_start_goal_exclusion_radius: 0.95
          route_obstacle_count: 4
          route_obstacle_progress_range: [0.20, 0.92]
          route_obstacle_lateral_offset_range: [-0.75, 0.75]
          route_obstacle_vertical_offset_range: [-0.25, 0.25]
          route_obstacle_longitudinal_jitter: 0.20
        reward_weights:
          goal: 60.0
          progress: 8.0
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.015
          timeout: -12.0
          timeout_distance: -28.0

evaluation:
  num_episodes: 20
  render: true
  deterministic: true
  save_trajectories: true
  output_dir: "results/post_corridor_target/eval"

visualization:
  plot_dir: "results/post_corridor_target/plots"
  trajectory_dir: "results/post_corridor_target/trajectories"
