name: "dynamic_uav_path_planning_post_commit_target_v5"
version: "1.0.0"
description: "Post-commit continuation with softer anti-stall shaping and looser capped horizons"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "curriculum", "teacher", "target", "post-commit", "anti-stall", "softer"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  auto_time_budget_max_steps: 0
  reward_weights:
    goal: 40.0
    progress: 8.0
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0
    remaining_distance: 0.0
    stall: 0.0
    stall_window_steps: 0
    stall_progress_threshold: 0.0
    stall_grace_steps: 0
    stall_remaining_ratio_threshold: 0.15

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.00010
  lr_critic: 0.00020
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 700
  save_interval: 15
  eval_interval: 15
  checkpoint_dir: "checkpoints/post_commit_target_v5"
  log_dir: "logs/post_commit_target_v5"
  results_dir: "results/post_commit_target_v5"
  moving_average_window: 20
  eval_episodes: 10
  print_interval: 10
  resume:
    checkpoint_path: "checkpoints/curriculum_goal_first_v3/stages/bridge_crossing_commit/best_model.pth"
    load_optimizer_state: false
    load_scheduler_state: false
    restore_curriculum_progress: false
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.5
    absolute_drop_threshold: 0.20
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.7
  curriculum:
    - name: "medium_crossing_intro"
      min_stage_episodes: 30
      required_consecutive_evals: 1
      advance_success_rate: 0.7
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.92
        obstacle_speed_range: [0.03, 0.11]
        max_episode_steps: 240
        auto_time_budget_steps_per_meter: 96.0
        auto_time_budget_padding: 12
        auto_time_budget_max_steps: 270
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.60, 0.70]
          goal_relative_y_range: [-0.40, 0.40]
          goal_relative_z_range: [-0.16, 0.16]
          min_start_goal_distance: 2.2
          obstacle_start_goal_clearance_margin: 0.60
        reward_weights:
          goal: 72.0
          progress: 10.5
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.015
          timeout: -14.0
          timeout_distance: -34.0
          remaining_distance: -0.004
          stall: -0.18
          stall_window_steps: 22
          stall_progress_threshold: 0.08
          stall_grace_steps: 48
          stall_remaining_ratio_threshold: 0.20
        teacher_config:
          enabled: true
          reward_scale: 0.32
          episode_bonus_budget: 14.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.92
          near_speed: 0.58
          near_goal_distance: 1.0
          direction_weight: 0.9
          speed_weight: 0.1

    - name: "medium_crossing"
      min_stage_episodes: 45
      required_consecutive_evals: 1
      advance_success_rate: 0.75
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.84
        obstacle_speed_range: [0.04, 0.13]
        max_episode_steps: 280
        auto_time_budget_steps_per_meter: 100.0
        auto_time_budget_padding: 14
        auto_time_budget_max_steps: 300
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.64, 0.76]
          goal_relative_y_range: [-0.50, 0.50]
          goal_relative_z_range: [-0.18, 0.18]
          min_start_goal_distance: 2.45
          obstacle_start_goal_clearance_margin: 0.55
        reward_weights:
          goal: 66.0
          progress: 9.6
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.015
          timeout: -14.0
          timeout_distance: -36.0
          remaining_distance: -0.005
          stall: -0.22
          stall_window_steps: 24
          stall_progress_threshold: 0.10
          stall_grace_steps: 52
          stall_remaining_ratio_threshold: 0.20
        teacher_config:
          enabled: true
          reward_scale: 0.26
          episode_bonus_budget: 12.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.55
          near_goal_distance: 1.0
          direction_weight: 0.9
          speed_weight: 0.1

    - name: "target_default"
      min_stage_episodes: 120
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.35
        obstacle_speed_range: [0.12, 0.35]
        max_episode_steps: 420
        auto_time_budget_steps_per_meter: 108.0
        auto_time_budget_padding: 14
        auto_time_budget_max_steps: 480
        reward_weights:
          goal: 62.0
          progress: 8.6
          clearance: 0.5
          clearance_positive_scale: 0.0
          time: -0.017
          timeout: -17.0
          timeout_distance: -40.0
          remaining_distance: -0.006
          stall: -0.26
          stall_window_steps: 26
          stall_progress_threshold: 0.14
          stall_grace_steps: 60
          stall_remaining_ratio_threshold: 0.22
        teacher_config:
          enabled: true
          reward_scale: 0.20
          episode_bonus_budget: 9.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.90
          near_speed: 0.52
          near_goal_distance: 1.0
          direction_weight: 0.9
          speed_weight: 0.1

evaluation:
  num_episodes: 20
  render: true
  deterministic: true
  save_trajectories: true
  output_dir: "results/post_commit_target_v5/eval"

visualization:
  plot_dir: "results/post_commit_target_v5/plots"
  trajectory_dir: "results/post_commit_target_v5/trajectories"
