name: "dynamic_uav_path_planning_curriculum_goal_first_v4"
version: "1.0.0"
description: "Fresh full curriculum from the simplest stages to target_default with medium ramp, target intro BC/demo warm start, and late-stage optimizer resets"
tags:
  [
    "uav",
    "path-planning",
    "dynamic-airspace",
    "pybullet",
    "gnn",
    "ppo",
    "curriculum",
    "teacher",
    "fresh-run",
    "behavior-cloning",
    "demo-pretrain",
    "target-intro",
  ]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  auto_time_budget_max_steps: 0
  reward_weights:
    goal: 40.0
    progress: 8.0
    progress_negative_scale: 1.0
    frontier_progress: 0.0
    commit_bonus_min_clearance: 0.0
    goal_proximity_bonus: 0.0
    goal_proximity_radius: 0.0
    goal_proximity_power: 1.0
    progress_milestone_bonus: 0.0
    progress_milestone_thresholds: []
    progress_milestone_bonus_weights: []
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    danger_clearance_threshold: 0.0
    danger_clearance_penalty: 0.0
    danger_clearance_power: 1.0
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0
    remaining_distance: 0.0
    stall: 0.0
    stall_window_steps: 0
    stall_progress_threshold: 0.0
    stall_grace_steps: 0
    stall_remaining_ratio_threshold: 0.15

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.00015
  lr_critic: 0.00030
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 2600
  save_interval: 20
  eval_interval: 20
  checkpoint_dir: "checkpoints/curriculum_goal_first_v4"
  log_dir: "logs/curriculum_goal_first_v4"
  results_dir: "results/curriculum_goal_first_v4"
  moving_average_window: 20
  eval_episodes: 10
  print_interval: 10
  resume: {}
  bc_demo_pretrain:
    enabled: true
    stages: ["target_default_intro", "target_default"]
    episodes: 80
    epochs: 16
    batch_size: 128
    teacher_gated_only: false
    gate_signal: "teacher_active"
    normalize_target_action: false
    seed_offset: 200000
    stage_overrides:
      target_default:
        episodes: 36
        epochs: 10
        batch_size: 128
        teacher_gated_only: true
        gate_signal: "teacher_active"
  bc_warm_start:
    enabled: true
    stages: ["target_default_intro", "target_default"]
    initial_coef: 0.08
    final_coef: 0.02
    anneal_episodes: 180
    teacher_gated_only: true
    gate_signal: "bypass_active"
    normalize_target_action: false
    stage_overrides:
      target_default_intro:
        initial_coef: 0.22
        final_coef: 0.06
        anneal_episodes: 260
        gate_signal: "teacher_active"
      target_default:
        initial_coef: 0.08
        final_coef: 0.02
        anneal_episodes: 180
        gate_signal: "bypass_active"
  stage_entry_optimizer_reset:
    enabled: true
    stages: ["medium_crossing_intro", "target_default_intro", "target_default"]
    lr_multiplier: 0.85
    reset_on_initial_stage: false
    stage_overrides:
      target_default_intro:
        lr_multiplier: 0.70
      target_default:
        lr_multiplier: 0.70
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.6
    absolute_drop_threshold: 0.20
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.7
    stage_overrides:
      medium_crossing_intro:
        activate_after_success_rate: 0.40
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.85
      medium_crossing:
        activate_after_success_rate: 0.45
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.85
      target_default_intro:
        activate_after_success_rate: 0.15
        absolute_drop_threshold: 0.15
        relative_drop_fraction: 0.6
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.8
      target_default:
        activate_after_success_rate: 0.20
        absolute_drop_threshold: 0.15
        relative_drop_fraction: 0.6
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.8
  curriculum:
    - name: "short_hop_goal_lock"
      min_stage_episodes: 20
      required_consecutive_evals: 1
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 1.1
        obstacle_speed_range: [0.02, 0.08]
        max_episode_steps: 180
        auto_time_budget_steps_per_meter: 100.0
        auto_time_budget_padding: 15
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.34, 0.44]
          goal_relative_y_range: [-0.3, 0.3]
          goal_relative_z_range: [-0.12, 0.12]
          min_start_goal_distance: 1.3
          obstacle_start_goal_clearance_margin: 0.9
        reward_weights:
          goal: 55.0
          progress: 10.0
          timeout_distance: -25.0
        teacher_config:
          enabled: true
          reward_scale: 0.25
          episode_bonus_budget: 15.0
          action_mix: 0.0
          repulsion_radius: 1.1
          repulsion_gain: 0.5
          far_speed: 0.9
          near_speed: 0.5
          near_goal_distance: 1.1

    - name: "corridor_dash"
      min_stage_episodes: 40
