name: "dynamic_uav_path_planning_default"
version: "1.1.1"
description: "Canonical default config based on the retained bypass-v3 curriculum run"
tags:
  [
    "uav",
    "path-planning",
    "dynamic-airspace",
    "pybullet",
    "gnn",
    "ppo",
    "curriculum",
    "teacher",
    "fresh-run",
    "bypass",
    "target-stage",
    "bypass-v3",
    "rejoin",
  ]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  auto_time_budget_max_steps: 0
  reward_weights:
    goal: 40.0
    progress: 8.0
    progress_negative_scale: 1.0
    frontier_progress: 0.0
    commit_bonus_min_clearance: 0.0
    goal_proximity_bonus: 0.0
    goal_proximity_radius: 0.0
    goal_proximity_power: 1.0
    progress_milestone_bonus: 0.0
    progress_milestone_thresholds: []
    progress_milestone_bonus_weights: []
    collision: -40.0
    clearance: 0.5
    clearance_positive_scale: 0.02
    danger_clearance_threshold: 0.0
    danger_clearance_penalty: 0.0
    danger_clearance_power: 1.0
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0
    remaining_distance: 0.0
    bypass_clearance_progress: 0.0
    route_rejoin_progress: 0.0
    stall: 0.0
    stall_window_steps: 0
    stall_progress_threshold: 0.0
    stall_grace_steps: 0
    stall_remaining_ratio_threshold: 0.15

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.0003
  lr_critic: 0.0006
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 3800
  save_interval: 20
  eval_interval: 20
  checkpoint_dir: "checkpoints/default"
  log_dir: "logs/default"
  results_dir: "results/default"
  moving_average_window: 20
  eval_episodes: 12
  print_interval: 10
  resume: {}
  bc_demo_pretrain:
    enabled: true
    stages:
      [
        "short_hop_goal_lock",
        "corridor_dash",
        "target_bypass_intro_v2",
        "target_bypass_commit_v2",
        "target_default_intro",
        "target_default",
      ]
    episodes: 24
    epochs: 8
    batch_size: 128
    teacher_gated_only: false
    gate_signal: "teacher_active"
    normalize_target_action: false
    successful_episodes_only: false
    fallback_to_all_episodes: true
    seed_offset: 200000
    stage_overrides:
      target_bypass_intro_v2:
        episodes: 80
        epochs: 16
        batch_size: 128
        teacher_gated_only: true
        gate_signal: "teacher_active"
        successful_episodes_only: true
        fallback_to_all_episodes: false
      target_bypass_commit_v2:
        episodes: 120
        epochs: 28
        batch_size: 128
        teacher_gated_only: true
        gate_signal: "teacher_active"
        successful_episodes_only: true
        fallback_to_all_episodes: false
        post_pretrain_action_std: 0.24
      target_default_intro:
        episodes: 128
        epochs: 24
        batch_size: 128
        successful_episodes_only: true
        fallback_to_all_episodes: false
      target_default:
        episodes: 96
        epochs: 18
        batch_size: 128
        successful_episodes_only: true
        fallback_to_all_episodes: false
  bc_warm_start:
    enabled: true
    stages: ["target_bypass_intro_v2", "target_bypass_commit_v2", "target_default_intro", "target_default"]
    initial_coef: 0.08
    final_coef: 0.02
    anneal_episodes: 220
    teacher_gated_only: true
    gate_signal: "bypass_active"
    normalize_target_action: false
    stage_overrides:
      target_bypass_intro_v2:
        initial_coef: 0.28
        final_coef: 0.12
        anneal_episodes: 420
        gate_signal: "teacher_active"
      target_bypass_commit_v2:
        initial_coef: 0.24
        final_coef: 0.10
        anneal_episodes: 420
        gate_signal: "teacher_active"
      target_default_intro:
        initial_coef: 0.14
        final_coef: 0.05
        anneal_episodes: 320
      target_default:
        initial_coef: 0.08
        final_coef: 0.02
        anneal_episodes: 220
  stage_entry_optimizer_reset:
    enabled: true
    stages:
      [
        "bridge_entry",
        "medium_crossing_intro",
        "target_bypass_intro_v2",
        "target_bypass_commit_v2",
        "target_default_intro",
        "target_default",
      ]
    lr_multiplier: 0.85
    reset_on_initial_stage: false
    stage_overrides:
      bridge_entry:
        lr_multiplier: 0.85
      medium_crossing_intro:
        lr_multiplier: 0.75
      target_bypass_intro_v2:
        lr_multiplier: 0.75
      target_bypass_commit_v2:
        lr_multiplier: 0.68
      target_default_intro:
        lr_multiplier: 0.58
      target_default:
        lr_multiplier: 0.50
  stage_regression_protection:
    enabled: true
    activate_after_success_rate: 0.6
    absolute_drop_threshold: 0.20
    relative_drop_fraction: 0.4
    consecutive_bad_evals: 2
    rollback_on_regression: true
    rollback_max_per_stage: 2
    lr_multiplier_after_rollback: 0.8
    stage_overrides:
      short_hop_goal_lock:
        activate_after_success_rate: 0.5
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.9
      corridor_dash:
        activate_after_success_rate: 0.5
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.9
      medium_crossing_intro:
        activate_after_success_rate: 0.40
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.9
      medium_crossing:
        activate_after_success_rate: 0.45
        absolute_drop_threshold: 0.20
        relative_drop_fraction: 0.5
        consecutive_bad_evals: 1
        rollback_max_per_stage: 2
        lr_multiplier_after_rollback: 0.9
      target_bypass_intro_v2:
        activate_after_success_rate: 0.15
        absolute_drop_threshold: 0.10
        relative_drop_fraction: 0.35
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.90
        plateau_recovery_enabled: true
        plateau_bad_eval_streak: 2
        plateau_max_per_stage: 3
        lr_multiplier_after_plateau_recovery: 0.90
        rerun_stage_demo_pretrain: true
        reset_stage_episode_on_plateau_recovery: true
      target_bypass_commit_v2:
        activate_after_success_rate: 0.20
        absolute_drop_threshold: 0.12
        relative_drop_fraction: 0.35
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.90
        plateau_recovery_enabled: true
        plateau_bad_eval_streak: 2
        plateau_max_per_stage: 3
        lr_multiplier_after_plateau_recovery: 0.90
        rerun_stage_demo_pretrain: true
        reset_stage_episode_on_plateau_recovery: true
      target_default_intro:
        activate_after_success_rate: 0.25
        absolute_drop_threshold: 0.12
        relative_drop_fraction: 0.4
        consecutive_bad_evals: 1
        rollback_max_per_stage: 3
        lr_multiplier_after_rollback: 0.85
        plateau_recovery_enabled: true
        plateau_bad_eval_streak: 4
        plateau_max_per_stage: 3
        lr_multiplier_after_plateau_recovery: 0.78
        rerun_stage_demo_pretrain: true
        reset_stage_episode_on_plateau_recovery: true
      target_default:
        activate_after_success_rate: 0.30
        absolute_drop_threshold: 0.12
        relative_drop_fraction: 0.45
        consecutive_bad_evals: 1
