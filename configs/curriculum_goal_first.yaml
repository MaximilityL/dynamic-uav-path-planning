name: "dynamic_uav_path_planning_curriculum_goal_first"
version: "1.0.1"
description: "Goal-first curriculum with timeout shaping and a lightweight heuristic teacher"
tags: ["uav", "path-planning", "dynamic-airspace", "pybullet", "gnn", "ppo", "curriculum", "teacher"]

environment:
  type: "dynamic_airspace"
  backend: "gym_pybullet_drones"
  num_agents: 1
  num_dynamic_obstacles: 5
  obstacle_radius: 0.2
  goal_tolerance: 0.35
  collision_distance: 0.15
  max_episode_steps: 800
  gui: false
  observation_type: "kin"
  action_type: "vel"
  pyb_freq: 240
  ctrl_freq: 30
  seed: 7
  connect_radius: 5.0
  workspace_bounds: [[-3.0, 3.0], [-3.0, 3.0], [0.5, 2.5]]
  obstacle_speed_range: [0.12, 0.35]
  auto_time_budget_steps_per_meter: 170.0
  auto_time_budget_padding: 30
  reward_weights:
    goal: 40.0
    progress: 8.0
    collision: -40.0
    clearance: 0.5
    effort: -0.005
    time: -0.01
    timeout: -8.0
    timeout_distance: -20.0

agent:
  type: "graph_ppo"
  encoder_type: "gnn"
  node_feature_dim: 10
  edge_feature_dim: 4
  global_feature_dim: 4
  action_dim: 4
  hidden_dim: 96
  message_passing_steps: 3
  lr_actor: 0.0003
  lr_critic: 0.0006
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.002
  value_coef: 0.5
  ppo_epochs: 3
  mini_batch_size: 64
  rollout_episodes: 4
  max_grad_norm: 0.5
  action_std_init: 0.2
  device: "auto"

training:
  num_episodes: 900
  save_interval: 25
  eval_interval: 25
  checkpoint_dir: "checkpoints/curriculum_goal_first"
  log_dir: "logs/curriculum_goal_first"
  results_dir: "results/curriculum_goal_first"
  moving_average_window: 20
  eval_episodes: 10
  curriculum:
    - name: "short_hop_goal_lock"
      min_stage_episodes: 20
      required_consecutive_evals: 1
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 1.1
        obstacle_speed_range: [0.02, 0.08]
        max_episode_steps: 180
        auto_time_budget_steps_per_meter: 100.0
        auto_time_budget_padding: 15
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.34, 0.44]
          goal_relative_y_range: [-0.3, 0.3]
          goal_relative_z_range: [-0.12, 0.12]
          min_start_goal_distance: 1.3
          obstacle_start_goal_clearance_margin: 0.9
        reward_weights:
          goal: 55.0
          progress: 10.0
          timeout_distance: -25.0
        teacher_config:
          enabled: true
          reward_scale: 0.25
          episode_bonus_budget: 15.0
          action_mix: 0.0
          repulsion_radius: 1.1
          repulsion_gain: 0.5
          far_speed: 0.9
          near_speed: 0.5
          near_goal_distance: 1.1
    - name: "corridor_dash"
      min_stage_episodes: 40
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.05
      environment:
        goal_tolerance: 1.1
        obstacle_speed_range: [0.02, 0.06]
        max_episode_steps: 200
        auto_time_budget_steps_per_meter: 100.0
        auto_time_budget_padding: 20
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.38, 0.46]
          goal_relative_y_range: [-0.18, 0.18]
          goal_relative_z_range: [-0.08, 0.08]
          min_start_goal_distance: 1.25
          obstacle_start_goal_clearance_margin: 1.0
        reward_weights:
          goal: 65.0
          progress: 11.0
          time: -0.006
          timeout: -6.0
          timeout_distance: -16.0
        teacher_config:
          enabled: true
          reward_scale: 0.28
          episode_bonus_budget: 18.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.9
          near_speed: 0.6
          near_goal_distance: 1.0
    - name: "bridge_crossing"
      min_stage_episodes: 60
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.9
        obstacle_speed_range: [0.03, 0.12]
        max_episode_steps: 300
        auto_time_budget_steps_per_meter: 122.0
        auto_time_budget_padding: 20
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.58, 0.7]
          goal_relative_y_range: [-0.45, 0.45]
          goal_relative_z_range: [-0.18, 0.18]
          min_start_goal_distance: 2.1
          obstacle_start_goal_clearance_margin: 0.6
        reward_weights:
          goal: 60.0
          progress: 9.5
          time: -0.012
          timeout: -10.0
          timeout_distance: -26.0
        teacher_config:
          enabled: true
          reward_scale: 0.16
          episode_bonus_budget: 6.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.9
          near_speed: 0.55
          near_goal_distance: 1.0
    - name: "medium_crossing"
      min_stage_episodes: 75
      required_consecutive_evals: 2
      advance_success_rate: 0.8
      advance_collision_rate: 0.1
      environment:
        goal_tolerance: 0.85
        obstacle_speed_range: [0.04, 0.14]
        max_episode_steps: 340
        auto_time_budget_steps_per_meter: 124.0
        auto_time_budget_padding: 20
        scenario_config:
          start_x_progress_range: [0.08, 0.18]
          goal_x_progress_range: [0.64, 0.76]
          goal_relative_y_range: [-0.55, 0.55]
          goal_relative_z_range: [-0.2, 0.2]
          min_start_goal_distance: 2.5
          obstacle_start_goal_clearance_margin: 0.55
        reward_weights:
          goal: 60.0
          progress: 8.5
          time: -0.013
          timeout: -12.0
          timeout_distance: -30.0
        teacher_config:
          enabled: true
          reward_scale: 0.16
          episode_bonus_budget: 6.0
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.45
          far_speed: 0.9
          near_speed: 0.55
          near_goal_distance: 1.0
    - name: "target_default"
      min_stage_episodes: 100
      required_consecutive_evals: 2
      advance_success_rate: 0.9
      advance_collision_rate: 0.05
      environment:
        goal_tolerance: 0.35
        obstacle_speed_range: [0.12, 0.35]
        max_episode_steps: 700
        auto_time_budget_steps_per_meter: 145.0
        auto_time_budget_padding: 20
        scenario_config:
          start_x_progress_range: [0.0833333333, 0.2]
          goal_x_progress_range: [0.8, 0.9166666667]
          min_start_goal_distance: 2.5
          obstacle_start_goal_clearance_margin: 0.2
        reward_weights:
          time: -0.015
          timeout: -12.0
          timeout_distance: -28.0
        teacher_config:
          enabled: true
          reward_scale: 0.04
          episode_bonus_budget: 1.5
          action_mix: 0.0
          repulsion_radius: 1.0
          repulsion_gain: 0.5
          far_speed: 0.9
          near_speed: 0.5
          near_goal_distance: 1.2

evaluation:
  num_episodes: 20
  render: false
  deterministic: true
  save_trajectories: true
  output_dir: "results/curriculum_goal_first/eval"

visualization:
  plot_dir: "results/curriculum_goal_first/plots"
  trajectory_dir: "results/curriculum_goal_first/trajectories"
